<!DOCTYPE html>

<body>
    <header>

            <img src="imgs/galeria/foto_(8).webp" class="item" style="height:300px" alt="Imagen 4">
            <img src="imgs/galeria/foto_(4).webp" class="item" style="height:200px" alt="Imagen 5">
            <img src="imgs/galeria/foto_(5).webp" class="item" style="height:160px" alt="Imagen 6">
            <img src="imgs/galeria/foto_(3).webp" class="item" style="height:140px" alt="Imagen 8">
            <img src="imgs/galeria/foto_(9).webp" class="item" style="height:220px" alt="Imagen 9">
            <img src="imgs/galeria/foto_(10).webp" class="item" style="height:180px" alt="Imagen 10">
            <img src="imgs/galeria/foto_(0).webp" class="item" style="height:240px" alt="Imagen 11">
            <img src="imgs/galeria/foto_(15).webp" class="item" style="height:120px" alt="Imagen 12">
            <img src="imgs/galeria/foto_(13).webp" class="item" style="height:300px" alt="Imagen 13">
            <img src="imgs/galeria/foto_(14).webp" class="item" style="height:200px" alt="Imagen 14">

    <div class="lightbox" id="lightbox">
        <div class="overlay"></div>
        <button class="nav-btn prev-btn" id="prev-btn">&#8249;</button>
        <img class="lightbox-img" id="lightbox-img" src="" alt="Preview">
        <button class="nav-btn next-btn" id="next-btn">&#8250;</button>
        <span class="close-btn" id="close-btn">&times;</span>
    </div>

    <footer>
        <div class="footer">
            <div class="footer-content">
                <div class="mapa">
                    <div class="info">
                        <h1>Contáctanos</h1>
                        <ul class="redes-sociales">
                            <li><a href="https://www.facebook.com/TapgroupRM/"><i class="bi bi-facebook"></i></a></li>
                            <li><a href="https://www.instagram.com/gruporm.mx/"><i class="bi bi-instagram"></i></a></li>
                            <li><a href="https://wa.me/9621843007"><i class="bi bi-whatsapp"></i></a></li>
                        </ul>

                        <ul class="numeros">
                            <li><i class="bi bi-telephone-fill"></i> 962 XXX XXXX</li>
                            <li><i class="bi bi-telephone-fill"></i> 962 XXX XXXX</li>
                        </ul>
                    </div>

                    <div class="info-mapa">
                        <h1>Visita nuestras oficinas</h1>
                        <p>
                            Fraccionamiento Tulipanes - Calle Del Mango, entre De La Soya y Tulipanes sur
                        </p>
                        <div class="mapita">
                            <iframe
                                src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1716.5590235485074!2d-92.28795378517907!3d14.874975267014415!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses!2smx!4v1725143639187!5m2!1ses!2smx"
                                loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                        </div>
                    </div>

                    <div class="contacto">
                        <div class="form-content">
                            <h1>Envíanos un correo</h1>
                            <form action="https://formspree.io/f/mgvwqqzy" method="post" novalidate>
                                <input type="text" name="Nombre" placeholder="Nombre" required>
                                <input type="email" name="Correo" placeholder="Correo electrónico" required>
                                <textarea name="Mensaje" placeholder="Ingrese su mensaje aquí" rows="5"
                                    style="resize: none;" required></textarea>
                                <button type="submit">Enviar</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const galleryItems = document.querySelectorAll('.gallery .item');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('close-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        let currentIndex = 0;

        galleryItems.forEach((item, index) => {
            item.addEventListener('click', () => {
                lightboxImg.src = item.src;
                lightbox.classList.add('show');
                currentIndex = index;
            });

            item.addEventListener('load', () => {
                item.classList.add('loaded');
            });
        });

        function updateLightbox(index) {
            lightboxImg.src = galleryItems[index].src;
        }

        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % galleryItems.length;
            updateLightbox(currentIndex);
        });

        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + galleryItems.length) % galleryItems.length;
            updateLightbox(currentIndex);
        });

        closeBtn.addEventListener('click', () => {
            lightbox.classList.remove('show');
        });

        document.querySelector('.overlay').addEventListener('click', () => {
            lightbox.classList.remove('show');
        });

        window.onbeforeunload = () => {
            for (const form of document.getElementsByTagName('form')) {
                form.reset();
            }
        };

        window.onload = function () {
            document.querySelector('.menu ul').classList.add('show');
        };
    </script>
</body>

</html>
